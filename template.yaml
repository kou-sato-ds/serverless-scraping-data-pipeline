AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless News RSS Collector + Athena Analytics Layer.
  Lambda fetches Google News RSS hourly to S3 (Hive-partitioned),
  Glue Crawler discovers partitions, Athena enables SQL analytics.

# =====================================================================
# Parameters
# =====================================================================
Parameters:
  ProjectName:
    Type: String
    Default: cloudpro-news-rss
  ScheduleExpression:
    Type: String
    Default: rate(1 hour)
  RssUrl:
    Type: String
    Default: https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja
  S3DataPrefix:
    Type: String
    Default: google-news-rss
    Description: S3 prefix where Lambda writes JSON (Crawler scans this path)

# =====================================================================
# Globals
# =====================================================================
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64

# =====================================================================
# Resources
# =====================================================================
Resources:

  # -------------------------------------------------------------------
  # S3 Bucket (Lambda 出力先 + Athena 結果保存先)
  # -------------------------------------------------------------------
  NewsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldData
            Status: Enabled
            ExpirationInDays: 90
          - Id: ExpireAthenaResults
            Status: Enabled
            Prefix: athena-results/
            ExpirationInDays: 7

  # -------------------------------------------------------------------
  # Lambda Function (RSS Collector)
  # -------------------------------------------------------------------
  RssCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-function"
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          S3_BUCKET: !Ref NewsBucket
          S3_PREFIX: !Ref S3DataPrefix
          RSS_URL: !Ref RssUrl
          MAX_ARTICLES: "100"
      Policies:
        - Statement:
            - Sid: AllowPutObjectToNewsBucket
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${NewsBucket.Arn}/${S3DataPrefix}/*"
      Events:
        HourlySchedule:
          Type: Schedule
          Properties:
            Name: !Sub "${ProjectName}-hourly-trigger"
            Schedule: !Ref ScheduleExpression
            Enabled: true

  # ===================================================================
  # Analytics Layer: Glue + Athena
  # ===================================================================

  # -------------------------------------------------------------------
  # Glue Database (テーブルを束ねる論理コンテナ)
  # -------------------------------------------------------------------
  NewsGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${ProjectName}_db"
        Description: Catalog for Google News RSS collected data

  # -------------------------------------------------------------------
  # IAM Role for Glue Crawler
  #   - 最小権限: 対象バケットの read のみ (他バケット触れない)
  # -------------------------------------------------------------------
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-crawler-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Glue サービス標準権限 (Glue Catalog write 等)
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: ReadNewsBucketOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadDataPrefix
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt NewsBucket.Arn
                  - !Sub "${NewsBucket.Arn}/${S3DataPrefix}/*"

  # -------------------------------------------------------------------
  # Glue Crawler (Hive パーティションの自動認識)
  #   - Schedule なし: ON_DEMAND (デプロイ後に手動で start)
  #   - CRAWL_NEW_FOLDERS_ONLY: 既存パーティションは再スキャンせず軽量
  # -------------------------------------------------------------------
  NewsCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${ProjectName}-crawler"
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref NewsGlueDatabase
      Description: Discovers Hive-partitioned JSON in S3 and registers as Athena tables
      Targets:
        S3Targets:
          - Path: !Sub "s3://${NewsBucket}/${S3DataPrefix}/"
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_NEW_FOLDERS_ONLY
      Configuration: |
        {
          "Version": 1.0,
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          },
          "CrawlerOutput": {
            "Partitions": { "AddOrUpdateBehavior": "InheritFromTable" }
          }
        }

  # -------------------------------------------------------------------
  # Athena WorkGroup (クエリ結果を集約管理)
  # -------------------------------------------------------------------
  NewsAthenaWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ProjectName}-workgroup"
      State: ENABLED
      Description: Workgroup for analyzing Google News RSS data
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${NewsBucket}/athena-results/"
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

# =====================================================================
# Outputs
# =====================================================================
Outputs:
  BucketName:
    Description: S3 bucket containing RSS-derived JSON
    Value: !Ref NewsBucket
    Export:
      Name: !Sub "${ProjectName}-bucket-name"
  BucketArn:
    Value: !GetAtt NewsBucket.Arn
  FunctionArn:
    Value: !GetAtt RssCollectorFunction.Arn
  FunctionName:
    Value: !Ref RssCollectorFunction
  GlueDatabaseName:
    Description: Glue database name (use in Athena)
    Value: !Ref NewsGlueDatabase
  CrawlerName:
    Description: Glue crawler name (run manually with `aws glue start-crawler`)
    Value: !Ref NewsCrawler
  AthenaWorkgroupName:
    Description: Athena workgroup for SQL analytics
    Value: !Ref NewsAthenaWorkgroup
